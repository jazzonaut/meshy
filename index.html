<!doctype html>
<html lang="en" class="app-dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05070a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Meshy — WebGPU Particle Field</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }
      #unsupported {
        position: fixed; inset: 0; display: none; place-items: center;
        font: 16px/1.6 system-ui, sans-serif; color: #ddd; text-align: center; padding: 2rem;
      }
      #unsupported.show { display: grid; }
      #unsupported code { color: #7ab7ff; }
      /* Loading veil: covers the canvas while the bundle parses and the GPU
       * pipelines (shaders) compile. The spinner animates `transform`, so it keeps
       * spinning on the compositor even while the main thread is busy compiling. */
      #loading {
        position: fixed; inset: 0; z-index: 50; display: grid; place-content: center;
        justify-items: center; gap: 0.9rem; background: #000; color: #9fb2c4;
        font: 13px/1.5 system-ui, sans-serif; letter-spacing: 0.02em;
        transition: opacity 0.45s ease;
      }
      #loading.hide { opacity: 0; pointer-events: none; }
      #loading .spinner {
        width: 34px; height: 34px; border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.14); border-top-color: #7ab7ff;
        animation: meshy-spin 0.8s linear infinite;
      }
      @keyframes meshy-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { #loading .spinner { animation-duration: 2s; } }
      /* Determinate progress bar: the inner fill is driven via transform: scaleX()
       * from JS so it animates on the compositor, staying smooth across compiles. */
      #loading .bar {
        width: 180px; height: 3px; border-radius: 3px;
        background: rgba(255, 255, 255, 0.12); overflow: hidden;
      }
      #loading #loading-bar {
        width: 100%; height: 100%; border-radius: 3px; background: #7ab7ff;
        transform: scaleX(0); transform-origin: left center;
        transition: transform 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading">
      <div class="spinner" aria-hidden="true"></div>
      <p id="loading-label">Warming up the particle field…</p>
      <div class="bar" aria-hidden="true"><div id="loading-bar"></div></div>
    </div>
    <div id="unsupported">
      <div>
        <p><strong>WebGPU isn't available in this browser.</strong></p>
        <p>Use a recent Chrome, Edge, Firefox, or Safari&nbsp;26+ build.<br />
        This app is WebGPU-only (no WebGL fallback by design).</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
